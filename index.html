<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사과게임 (Fruit Box)</title>
    <meta name="google-adsense-account" content="ca-pub-5074216747409943">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5074216747409943" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
</head>
<body>
    <div id="game-container">
        <header>
            <div class="stats">
                <div class="stat-item">
                    <span class="label">SCORE</span>
                    <span id="score">0</span>
                </div>
                <div class="stat-item">
                    <span class="label">TIME</span>
                    <span id="timer">120</span>
                </div>
            </div>
            <h1>사과게임</h1>
            <button id="reset-btn">다시 시작</button>
        </header>

        <main id="game-board-container">
            <div id="game-board"></div>
            <div id="selection-box"></div>
        </main>

        <div id="overlay" class="hidden">
            <div class="modal">
                <h2 id="modal-title">게임 종료!</h2>
                <p>최종 점수: <span id="final-score">0</span></p>
                <button id="start-btn">게임 시작</button>
            </div>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
